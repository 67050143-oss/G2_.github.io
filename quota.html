<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quota Round - IOTE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Prompt',sans-serif;
  background:#15072e;
  color:white;
}

.navbar{
  background:linear-gradient(to bottom,rgba(0,0,0,0.85),rgba(0,0,0,0));
}

.hero{
  height:40vh;
  background:url("admission.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}

.hero h1{
  position:relative;
  z-index:2;
  font-size:3rem;
  font-weight:600;
}

.quota-section{
  padding:80px 0;
}

.quota-box{
  background:#e9e9e9;
  padding:50px;
  border-radius:10px;
  max-width:950px;
  margin:auto;
  color:black;
}

.quota-title{
  font-size:28px;
  font-weight:600;
  margin-bottom:40px;
}

.quota-card{
  min-height:130px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  font-size:20px;
  font-weight:500;
  background:linear-gradient(135deg,#ff8a00,#2a1f9d);
  text-decoration:none;
  transition:0.3s;
  padding:20px;
}

.quota-card:hover{
  transform:scale(1.05);
  color:white;
}

.back-btn{
  margin-bottom:25px;
}
/* ===== THEME TOGGLE BUTTON ===== */
.theme-toggle{
  border:none;
  border-radius:12px;
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.12);
  color:white;
  font-size:1.1rem;
  transition:.3s;
}

.theme-toggle:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,0.2);
}

/* ===== LIGHT MODE ===== */
body.light-mode{
  background:#f6f7fb;
  color:#1a1a1a;
}

/* navbar */
body.light-mode .navbar{
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(14px);
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

body.light-mode .navbar-brand{
  color:#5b2cff !important;
  font-weight:600;
}

body.light-mode .nav-link{
  color:#222 !important;
}

body.light-mode .theme-toggle{
  background:#f1f2f6;
  color:#222;
  border:1px solid rgba(0,0,0,0.08);
}

/* hero */
body.light-mode .hero::before{
  background:rgba(255,255,255,0.38);
}

body.light-mode .hero h1,
body.light-mode .hero h3{
  color:white;
  text-shadow:0 8px 24px rgba(0,0,0,0.35);
}

/* dark sections become light */
body.light-mode .section-dark{
  background:linear-gradient(180deg,#ffffff 0%, #f7f8fc 100%);
  color:#1a1a1a;
}

body.light-mode .section-dark h2,
body.light-mode .section-dark h3,
body.light-mode .section-dark h4,
body.light-mode .section-dark h5,
body.light-mode .section-dark p,
body.light-mode .section-dark .lead{
  color:#1a1a1a !important;
}

/* cards */
body.light-mode .feature-box,
body.light-mode .project-video-card,
body.light-mode .project-thumb,
body.light-mode .iote-path-shell,
body.light-mode .iote-glass-card,
body.light-mode .contact-card,
body.light-mode .admission-card,
body.light-mode .faculty-card,
body.light-mode .detail-box,
body.light-mode .section-space,
body.light-mode .glass-box{
  background:rgba(255,255,255,0.92) !important;
  color:#1a1a1a !important;
  border:1px solid rgba(0,0,0,0.08);
  box-shadow:0 14px 30px rgba(0,0,0,0.08);
}

/* text in cards */
body.light-mode .feature-box p,
body.light-mode .project-video-body p,
body.light-mode .project-thumb-body p,
body.light-mode .section-subtitle,
body.light-mode .iote-path-subtitle,
body.light-mode .iote-match-copy,
body.light-mode .contact-card a,
body.light-mode .admission-card p,
body.light-mode .faculty-expertise,
body.light-mode .detail-box p,
body.light-mode .detail-box li,
body.light-mode .section-space p{
  color:#444 !important;
}

/* headings */
body.light-mode h1,
body.light-mode h2,
body.light-mode h3,
body.light-mode h4,
body.light-mode h5,
body.light-mode h6{
  color:#151515;
}

/* buttons */
body.light-mode .btn-warning,
body.light-mode .project-btn-primary,
body.light-mode .assessment-btn,
body.light-mode .iote-primary-btn{
  background:#ffd54a !important;
  color:#1a1a1a !important;
  border:none;
}

body.light-mode .project-btn-outline,
body.light-mode .iote-secondary-btn{
  border:1px solid rgba(0,0,0,0.12);
  color:#222 !important;
  background:#fff;
}

/* project section */
body.light-mode .project-showcase{
  background:linear-gradient(180deg,#f7f8fc 0%, #eef1f8 100%);
  color:#1a1a1a;
}

body.light-mode .project-showcase h2,
body.light-mode .project-showcase p{
  color:#1a1a1a !important;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">IoT and Information Engineering</a>
  </div>
</nav>

<section class="hero">
  <h1>Quota Admission</h1>
</section>

<section class="quota-section">
  <div class="quota-box">

    <a href="admission.html" class="btn btn-dark back-btn">
      ← กลับไปหน้า Admission
    </a>

    <div class="quota-title">รอบ 2 QUOTA</div>

    <div class="row g-4">
      <div class="col-md-4">
        <a href="quota1.html" class="quota-card">
          โควตาเรียนดี
        </a>
      </div>

      <div class="col-md-4">
        <a href="quota2.html" class="quota-card">
          โควตา KMITL One
        </a>
      </div>

      <div class="col-md-4">
        <a href="quota3.html" class="quota-card">
          โควตากิจกรรม<br>K-Engineering
        </a>
      </div>
    </div>

  </div>
</section>
<div id="iote-assistant-mount"></div>
<link rel="stylesheet" href="assistant.css">
<script src="routes.js"></script>
<script src="knowledge-th.js"></script>
<script src="knowledge-en.js"></script>
<script src="assistant.js"></script>
<script>
const toggleBtn = document.getElementById("themeToggle");

function updateThemeIcon(){
  if(document.body.classList.contains("light-mode")){
    toggleBtn.textContent = "🌙";
  }else{
    toggleBtn.textContent = "☀️";
  }
}

if(localStorage.getItem("theme") === "light"){
  document.body.classList.add("light-mode");
}

updateThemeIcon();

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("light-mode");

  if(document.body.classList.contains("light-mode")){
    localStorage.setItem("theme","light");
  }else{
    localStorage.setItem("theme","dark");
  }

  updateThemeIcon();
});
</script>
</body>
</html>
